<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – Anime Figuarts</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.php" class="logo">
        <img src="image_fond/capture_d_%C3%A9cran__anime_figuarts-removebg-preview.png" alt="Anime Figuarts" class="logo-img" />
      </a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Se connecter</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">S'inscrire</button>
      </div>

      <!-- FORMULAIRE DE CONNEXION -->
      <div id="formLogin">
        <h2 class="auth-title">Bon retour !</h2>
        <form action="login.php" method="POST" class="auth-form">
          <input type="hidden" name="action" value="login">
          <div class="form-group">
            <label>Adresse email</label>
            <input type="email" name="email" required />
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required />
          </div>
          <button type="submit" class="btn-auth">Se connecter</button>
        </form>
      </div>

      <!-- FORMULAIRE D'INSCRIPTION -->
      <div id="formRegister" style="display:none">
        <h2 class="auth-title">Créer un compte</h2>
        <form action="login.php" method="POST" class="auth-form">
          <input type="hidden" name="action" value="register">
          <div class="form-row">
            <div class="form-group">
              <label>Prénom</label>
              <input type="text" name="first_name" required />
            </div>
            <div class="form-group">
              <label>Nom</label>
              <input type="text" name="last_name" required />
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" name="password" required minlength="6" />
          </div>
          <button type="submit" class="btn-auth">Créer mon compte</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none';
    }
  </script>
</body>
</html>
